name: build-windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Coplan.exe
        shell: pwsh
        run: |
          ./_nina_ceo/builds/build_windows_exe.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coplan-windows
          path: dist/Coplan/
          if-no-files-found: error
          retention-days: 14
