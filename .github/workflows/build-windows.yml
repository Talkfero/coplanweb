name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Coplan.exe
        shell: pwsh
        run: |
          ./scripts/build/build_windows_exe.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coplan-windows
          path: dist/Coplan/
          if-no-files-found: error
          retention-days: 14

      # Mantem apenas o artifact desta run: apaga os "Coplan-windows" de
      # runs anteriores. Roda so apos o upload ter sucesso (sem if:always),
      # garantindo que nunca ficamos sem nenhum artifact.
      - name: Limpar artifacts antigos
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $resp = gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" | ConvertFrom-Json
          foreach ($a in $resp.artifacts) {
            if ($a.name -eq "Coplan-windows" -and $a.workflow_run.id -ne ${{ github.run_id }}) {
              Write-Host "Removendo artifact antigo id=$($a.id) run=$($a.workflow_run.id) criado=$($a.created_at)"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$($a.id)" | Out-Null
            }
          }

